<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Endangered Cake Museum</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <style>
      /* Overlay button controls */
      #game-controls {
        position: absolute;
        top: 8px;
        right: 8px;
        display: none; /* hidden until game loads */
        gap: 6px;
        z-index: 100;
      }

      .game-btn {
        width: 32px;
        height: 32px;
        padding: 4px;
        background: rgba(0, 0, 0, 0.45);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        opacity: 0.6;
        transition: opacity 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .game-btn:hover {
        opacity: 1;
      }

      .game-btn img {
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>

      <!-- Overlay controls (mute + fullscreen) -->
      <div id="game-controls">
        <button id="mute-btn" class="game-btn" title="Toggle Sound">
          <img id="mute-icon" src="/icons/buttons/play.png" alt="Sound">
        </button>
        <button id="fullscreen-btn" class="game-btn" title="Toggle Fullscreen">
          <img id="fullscreen-icon" src="/icons/buttons/fullscreen.png" alt="Fullscreen">
        </button>
      </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Touch_Controls_v6.loader.js";
      var config = {
        dataUrl: buildUrl + "/Touch_Controls_v6.data",
        frameworkUrl: buildUrl + "/Touch_Controls_v6.framework.js",
        codeUrl: buildUrl + "/Touch_Controls_v6.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Drakonic",
        productName: "Endangered Cake Museum",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // By default Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      loadingBar.style.display = "block";

      // --- Control state ---
      var gameInstance = null;
      var isMuted = false;
      var isMobileFullscreen = false;
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      var controlsEl = document.getElementById("game-controls");
      var muteBtn = document.getElementById("mute-btn");
      var muteIcon = document.getElementById("mute-icon");
      var fullscreenBtn = document.getElementById("fullscreen-btn");
      var fullscreenIcon = document.getElementById("fullscreen-icon");

      // --- Mute logic ---
      muteBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        if (!gameInstance) return;
        isMuted = !isMuted;
        muteIcon.src = isMuted ? "/icons/buttons/mute.png" : "/icons/buttons/play.png";
        gameInstance.SendMessage("AudioManager", "ToggleMute");
      });

      // --- Fullscreen logic ---
      fullscreenBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        toggleFullscreen();
      });

      function toggleFullscreen() {
        if (isMobile) {
          // Mobile: tell parent Modal to expand/collapse iframe
          if (isMobileFullscreen) {
            isMobileFullscreen = false;
            fullscreenIcon.src = "/icons/buttons/fullscreen.png";
            window.parent.postMessage({ type: 'UNITY_GAME_EXIT_FULLSCREEN' }, '*');
          } else {
            isMobileFullscreen = true;
            fullscreenIcon.src = "/icons/buttons/close.png";
            window.parent.postMessage({ type: 'UNITY_GAME_FULLSCREEN' }, '*');
          }
        } else {
          // Desktop: use native Fullscreen API
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
          if (isFs) {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
          } else {
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            else if (container.msRequestFullscreen) container.msRequestFullscreen();
          }
        }
      }

      // Keep fullscreen icon in sync when user exits fullscreen via Escape key
      document.addEventListener("fullscreenchange", updateFullscreenIcon);
      document.addEventListener("webkitfullscreenchange", updateFullscreenIcon);

      function updateFullscreenIcon() {
        var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
        fullscreenIcon.src = isFs ? "/icons/buttons/close.png" : "/icons/buttons/fullscreen.png";
      }

      // --- Mobile: tap canvas to fullscreen ---
      if (isMobile) {
        canvas.addEventListener("touchstart", function () {
          if (!gameInstance) return;
          if (!isMobileFullscreen) {
            isMobileFullscreen = true;
            fullscreenIcon.src = "/icons/buttons/close.png";
            window.parent.postMessage({ type: 'UNITY_GAME_FULLSCREEN' }, '*');
          }
        }, { passive: true });
      }

      // --- Load Unity ---
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          gameInstance = unityInstance;
          loadingBar.style.display = "none";
          // Show controls once game is loaded
          controlsEl.style.display = "flex";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
